<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Variant - AttireFlow</title>
    <meta charset="UTF-8"/>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        label { display:block; margin-top: 10px; }
        input { padding: 8px; width: 360px; max-width: 100%; }
        .row { margin-top: 14px; }
        a { color: #0b57d0; text-decoration: none; }
        a:hover { text-decoration: underline; }
        button { padding: 8px 12px; cursor: pointer; }
        .muted { color: #666; }
        .alert { padding: 10px 12px; margin: 14px 0; border-radius: 4px; }
        .alert-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>
<h1>Create New Variant</h1>
<p class="muted"><a href="/inventory">← Back to Inventory</a></p>

<div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}">
    Error
</div>

<form th:action="@{/inventory/new}" method="post">
    <label>Title
        <input type="text" name="title" th:value="${variant.title}" required/>
    </label>

    <label>Category
        <input type="text" name="category" th:value="${variant.category}" required/>
    </label>

    <label>Size
        <input type="text" name="size" th:value="${variant.size}" required/>
    </label>

    <label>Color
        <input type="text" name="color" th:value="${variant.color}" required/>
    </label>

    <label>Unit Price
        <input type="number" name="unitPrice" step="0.01" min="0.01" th:value="${variant.unitPrice}" required/>
    </label>

    <div class="row">
        <button type="submit">Create Variant</button>
        <a href="/inventory" style="margin-left: 10px;">Cancel</a>
    </div>
</form>

</body>
</html>
